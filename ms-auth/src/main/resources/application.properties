spring.application.name=ms-auth
server.port=8081

# 1. DIRECCIÓN DE LA BASE DE DATOS (XAMPP)
# createDatabaseIfNotExist=true hará que la base de datos se cree sola en tu XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/ms_auth_db_v2?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. CONFIGURACIÓN DE FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# 3. CONFIGURACIÓN DE JPA (Hibernate)
# Ponemos 'none' porque Flyway se encargará de las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 4. REGISTRO EN EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/