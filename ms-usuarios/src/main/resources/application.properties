# Configuración del servidor
server.port=8082
spring.application.name=ms-usuarios

# Configuración de la Base de Datos (MySQL en XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/reservas_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Configuración de Flyway (Opcional pero recomendado si vas a usar scripts SQL)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true