# Puerto del Microservicio
server.port=8082
spring.application.name=ms-usuarios

# Conexión a la Base de Datos (Corregida según tu captura)
spring.datasource.url=jdbc:mysql://localhost:3306/reservas_usuarios?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Desactivar Flyway para evitar errores de arranque
spring.flyway.enabled=false

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/