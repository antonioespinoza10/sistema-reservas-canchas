spring.application.name=ms-api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=ms-usuarios
spring.cloud.gateway.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.routes[0].predicates[0]=Path=/usuarios/**

spring.cloud.gateway.routes[1].id=ms-canchas
spring.cloud.gateway.routes[1].uri=lb://ms-canchas
spring.cloud.gateway.routes[1].predicates[0]=Path=/canchas/**

spring.cloud.gateway.routes[2].id=ms-reservas
spring.cloud.gateway.routes[2].uri=lb://ms-reservas
spring.cloud.gateway.routes[2].predicates[0]=Path=/reservas/**

spring.cloud.gateway.routes[3].id=ms-auth
spring.cloud.gateway.routes[3].uri=lb://ms-auth
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**
